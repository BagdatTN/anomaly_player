<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player for Yandex.Disk</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .player-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        audio { width: 100%; margin-top: 20px; }
        .status { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="player-card">
    <h3>Мой Аудио Плеер</h3>
    <div id="filename" class="status">Загрузка файла...</div>
    <audio id="audioPlayer" controls playsinline></audio>
    <div id="saveStatus" class="status"></div>
</div>

<script>
    const player = document.getElementById('audioPlayer');
    const filenameDisplay = document.getElementById('filename');
    const status = document.getElementById('saveStatus');
    
    // Включаем CORS для плеера
    player.crossOrigin = "anonymous";

    const urlParams = new URLSearchParams(window.location.search);
    let publicUrl = urlParams.get('file');

    if (publicUrl) {
        publicUrl = publicUrl.replace('disk.360.yandex.ru', 'disk.yandex.ru');
        filenameDisplay.innerText = "Получаю доступ к файлу...";

        fetch(`https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=${encodeURIComponent(publicUrl)}`)
            .then(res => res.json())
            .then(data => {
                if (!data.href) throw new Error('Яндекс не дал прямую ссылку');
                
                // Чтобы обойти кэширование и CORS, иногда помогает добавка случайного параметра
                const finalLink = data.href;
                
                player.src = finalLink;
                filenameDisplay.innerText = "Файл загружен. Нажмите Play.";

                player.onloadedmetadata = () => {
                    const savedTime = localStorage.getItem(publicUrl);
                    if (savedTime) {
                        player.currentTime = parseFloat(savedTime);
                    }
                };
            })
            .catch(err => {
                filenameDisplay.innerText = "Ошибка доступа: " + err.message;
            });
    }

    const saveProgress = () => {
        if (publicUrl && player.currentTime > 0) {
            localStorage.setItem(publicUrl, player.currentTime);
            status.innerText = "Сохранено: " + Math.floor(player.currentTime) + " сек.";
        }
    };

    player.onpause = saveProgress;
    setInterval(saveProgress, 5000);

    // Дополнительная проверка на ошибку
    player.onerror = (e) => {
        console.error("Audio error details:", player.error);
        filenameDisplay.innerText = "Ошибка: Яндекс блокирует прямой доступ (CORS).";
    };
</script>

</body>

</html>
