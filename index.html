<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player for Yandex.Disk</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .player-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        audio { width: 100%; margin-top: 20px; }
        .status { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="player-card">
    <h3>Мой Аудио Плеер</h3>
    <div id="filename" class="status">Загрузка файла...</div>
    <audio id="audioPlayer" controls playsinline></audio>
    <div id="saveStatus" class="status"></div>
</div>

<script>
    const player = document.getElementById('audioPlayer');
    const filenameDisplay = document.getElementById('filename');
    const status = document.getElementById('saveStatus');
    
    // 1. Получаем и нормализуем ссылку
    const urlParams = new URLSearchParams(window.location.search);
    let publicUrl = urlParams.get('file');

    if (publicUrl) {
        // На всякий случай меняем disk.360 на обычный disk.yandex
        publicUrl = publicUrl.replace('disk.360.yandex.ru', 'disk.yandex.ru');

        filenameDisplay.innerText = "Связываюсь с Яндексом...";

        fetch(`https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=${encodeURIComponent(publicUrl)}`)
            .then(res => {
                if (!res.ok) throw new Error('Яндекс не отдал файл. Проверьте, что ссылка публичная.');
                return res.json();
            })
            .then(data => {
                filenameDisplay.innerText = "Файл найден, загружаю в плеер...";
                
                // Устанавливаем источник
                player.src = data.href;
                player.load(); // Принудительная подгрузка

                // 2. Восстанавливаем время
                player.onloadedmetadata = () => {
                    const savedTime = localStorage.getItem(publicUrl);
                    if (savedTime) {
                        player.currentTime = parseFloat(savedTime);
                    }
                    filenameDisplay.innerText = "Готов к прослушиванию";
                };
            })
            .catch(err => {
                filenameDisplay.innerText = "Ошибка: " + err.message;
                console.error(err);
            });
    } else {
        filenameDisplay.innerText = "Ссылку не нашли. Добавьте ?file=... в адресную строку";
    }

    // Обработка ошибок самого плеера
    player.onerror = () => {
        filenameDisplay.innerText = "Ошибка плеера: Браузер не может проиграть этот файл.";
    };

    // 3. Сохраняем прогресс
    const saveProgress = () => {
        if (publicUrl && player.currentTime > 0) {
            localStorage.setItem(publicUrl, player.currentTime);
            status.innerText = "Время " + Math.floor(player.currentTime) + " сек. сохранено";
        }
    };

    player.onpause = saveProgress;
    setInterval(saveProgress, 5000); // Автосохранение каждые 5 сек
</script>

</body>

</html>
